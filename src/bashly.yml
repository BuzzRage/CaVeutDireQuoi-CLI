name: cvdq-cli
help: Traducteur d'acronymes et de sigles
version: 1.2.0


# Proporties for mandoc renderer.
# Run `bashly render :mandoc --about` for more info.
x_mandoc_authors: BuzzRage
x_mandoc_footer: |-
  # ISSUE TRACKER
  Report issues at <https://github.com/BuzzRage/CaVeutDireQuoi-CLI/issues>

args:
- name: FILE
  help: '.JSON file to load as a glossary'

flags:
- long: --add
  short: -a
  arg: NEW_ITEM
  help: 'New Item to add in FILE'

- long: --key
  short: -k
  arg: KEY
  help: 'Key of the attribute to look for in the .JSON file'
  default: "desc"

- long: --verbose
  short: -v
  help: Set verbose output to true

- long: --item
  short: -i
  arg: ITEM
  help: item to look for in the .JSON file

- long: --sort
  short: -s
  help: "Sort the .JSON"

- long: --format
  short: -f
  help: "Format the FILE in the expected .JSON format"

- long: --remote
  short: -r
  conflicts: [--sort, --format, --add]
  needs: [--item]
  help: "Specify the remote JSON file to work with"

examples:
- REMOTE_SOURCE="https://myurl.org/api/explore/catalog/datasets/glossaire-sigles-acronymes/exports/json" cvdq-cli -i IETF --remote
- cvdq-cli "glossaire-reseau.json" -i IETF
- cvdq-cli -k desc -i IETF
- cvdq-cli --sort "glossaire-reseau.json" --verbose
- cvdq-cli --add UNESCO
- cvdq-cli --format "glossaire-medecine.json"
- cvdq-cli -h

environment_variables:
- name: default_glossary
  help: Set the default glossary file to "glossaire.json"
  default: "json/glossaire.json"

- name : remote_source
  help: Set the remote JSON source
  default: "https://data.occitanie.education.gouv.fr/api/explore/v2.1/catalog/datasets/fr-en-occitanie-glossaire-sigles-acronymes/exports/json"

